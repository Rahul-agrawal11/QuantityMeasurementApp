## =========================================================
## APPLICATION
## =========================================================
spring.application.name=QuantityMeasurementApp
server.port=${PORT:8080}

## Active Profile -- set SPRING_PROFILES_ACTIVE=prod in Railway env vars
spring.profiles.active=${SPRING_PROFILES_ACTIVE:prod}

## =========================================================
## JPA COMMON CONFIG
## =========================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

## =========================================================
## LOGGING (COMMON)
## =========================================================
logging.level.root=INFO
logging.level.com.app.quantitymeasurement=INFO

## =========================================================
## SWAGGER / OPENAPI
## =========================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

## =========================================================
## ACTUATOR (health checks for Railway)
## =========================================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

## =========================================================
## OAUTH2 (COMMON)
## =========================================================
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=${BACKEND_URL}/login/oauth2/code/google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}